version: "3.9"

services:
  # ── CTI-Shield App ─────────────────────────────────────────────────
  cti-shield:
    build: .
    container_name: cti-shield-app
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - faiss_data:/app/data/faiss_index
      - osint_data:/app/data/osint_reports
      - kg_snapshots:/app/data/kg_snapshots
      - logs:/app/logs
    depends_on:
      - ollama
    networks:
      - cti-net

  # ── Ollama (Local LLM — optional, 100% private) ───────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: cti-shield-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - cti-net
    # Uncomment for GPU support:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]

  # ── Neo4j Knowledge Graph (free community edition) ─────────────────
  neo4j:
    image: neo4j:5-community
    container_name: cti-shield-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/ctishield2026
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - cti-net

  # ── MLflow (Experiment Tracking — open source) ─────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: cti-shield-mlflow
    restart: unless-stopped
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0 --port 5000
    volumes:
      - mlflow_data:/mlruns
    networks:
      - cti-net

  # ── Nginx Reverse Proxy (Production) ──────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: cti-shield-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - cti-shield
    networks:
      - cti-net

volumes:
  faiss_data:
  osint_data:
  kg_snapshots:
  ollama_models:
  neo4j_data:
  neo4j_logs:
  mlflow_data:
  logs:

networks:
  cti-net:
    driver: bridge
